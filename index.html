<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veckans Mat — CSK Karlstad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F7F3EC;
      --cream-dark:  #EDE7D9;
      --green:       #2D4A3E;
      --green-light: #3D6455;
      --green-muted: #C8D8CD;
      --amber:       #C8853A;
      --amber-light: #E8B87A;
      --charcoal:    #2A2520;
      --muted:       #7A7068;
      --white:       #FDFAF6;
      --divider:     #D8CEBF;
      --red:         #C0392B;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ────────────────────────────────────── */
    header {
      background: var(--green);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .site-title    { font-family: 'Playfair Display', serif; font-size: 1.45rem; color: var(--cream); }
    .site-subtitle { font-size: 0.72rem; color: var(--green-muted); font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; }

    .week-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .week-tab {
      background: transparent;
      border: 1.5px solid rgba(200,216,205,0.4);
      color: var(--green-muted);
      padding: 7px 16px;
      border-radius: 100px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }
    .week-tab:hover { border-color: var(--amber-light); color: var(--amber-light); }
    .week-tab.active { background: var(--amber); border-color: var(--amber); color: #fff; }

    /* ── HERO STRIP ────────────────────────────────── */
    .hero-strip { background: var(--green-light); padding: 9px 28px; text-align: center; }
    .hero-strip p { color: var(--cream); font-size: 0.78rem; letter-spacing: 0.04em; opacity: 0.85; }

    /* ── DAY NAV ────────────────────────────────────── */
    .day-nav { background: var(--white); border-bottom: 1px solid var(--divider); padding: 0 28px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .day-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; }
    .day-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 13px 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.2s;
    }
    .day-btn:hover { color: var(--green); }
    .day-btn.active { color: var(--green); border-bottom-color: var(--amber); }
    .day-btn.today { color: var(--amber); font-weight: 600; }
    .today-dot { display: inline-block; width: 5px; height: 5px; background: var(--amber); border-radius: 50%; margin-left: 4px; vertical-align: middle; margin-bottom: 2px; }

    /* ── MAIN ────────────────────────────────────────── */
    main { max-width: 1200px; margin: 0 auto; padding: 36px 28px 60px; }

    /* ── LOADING / ERROR ──────────────────────────────── */
    .state-box {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 260px; gap: 16px; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--cream-dark);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon { font-size: 2.5rem; }
    .error-msg { font-size: 0.9rem; text-align: center; max-width: 340px; }
    .retry-btn {
      background: var(--green); color: var(--cream); border: none; padding: 9px 22px;
      border-radius: 100px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    }
    .retry-btn:hover { background: var(--green-light); }

    /* ── DAY HEADING ──────────────────────────────────── */
    .day-heading { display: flex; align-items: baseline; gap: 12px; margin-bottom: 26px; flex-wrap: wrap; }
    .day-heading h2 { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--green); line-height: 1; }
    .day-date { font-size: 0.85rem; color: var(--muted); font-style: italic; font-family: 'Lora', serif; }
    .today-badge { background: var(--amber); color: #fff; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; }

    /* ── RESTAURANT GRID ──────────────────────────────── */
    .restaurant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }

    /* ── CARD ─────────────────────────────────────────── */
    .restaurant-card {
      background: var(--white);
      border: 1px solid var(--divider);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .restaurant-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.09); }

    .card-header {
      padding: 16px 20px 13px;
      border-bottom: 1px solid var(--divider);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    .restaurant-name { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--green); font-weight: 700; }
    .restaurant-meta { font-size: 0.73rem; color: var(--muted); margin-top: 2px; font-weight: 300; }

    .badge { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; white-space: nowrap; }
    .badge-open   { background: #E8F4ED; color: #2D6A4F; }
    .badge-closed { background: #FDECEA; color: var(--red); }

    .menu-body { padding: 16px 20px; flex: 1; }

    .closed-msg { font-style: italic; color: var(--red); font-family: 'Lora', serif; font-size: 0.92rem; }

    .dish { display: flex; gap: 11px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--cream-dark); }
    .dish:last-child { border-bottom: none; }
    .dish-icon {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; flex-shrink: 0; margin-top: 2px;
    }
    .dish-icon.veg  { background: #E8F4ED; }
    .dish-icon.fish { background: #E8F1FA; }
    .dish-icon.meat { background: #FDF0E8; }
    .dish-text { font-size: 0.88rem; color: var(--charcoal); line-height: 1.45; font-family: 'Lora', serif; }

    .hours-row { display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 20px; background: #F0F7F3; border-top: 1px solid var(--divider); font-size: 0.76rem; color: var(--green); }
    .hours-row strong { font-weight: 600; }

    .source-bar {
      background: var(--cream-dark); border-top: 1px solid var(--divider);
      padding: 7px 20px; font-size: 0.7rem; color: var(--muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .source-bar a { color: var(--green); text-decoration: none; font-weight: 500; }
    .source-bar a:hover { text-decoration: underline; }

    /* ── FOOTER ────────────────────────────────────────── */
    footer { background: var(--green); color: var(--green-muted); text-align: center; padding: 22px; font-size: 0.76rem; }
    footer a { color: var(--amber-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── UPDATE BADGE ──────────────────────────────────── */
    .update-info { font-size: 0.7rem; color: var(--muted); text-align: right; margin-bottom: 18px; }

    /* ── ANIMATIONS ────────────────────────────────────── */
    #content-area { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* ── RESPONSIVE ────────────────────────────────────── */
    @media (max-width: 720px) {
      .restaurant-grid { grid-template-columns: 1fr; }
      .day-heading h2 { font-size: 1.4rem; }
      main { padding: 22px 16px 48px; }
      .header-inner { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="site-title">Veckans Mat</div>
      <div class="site-subtitle">Centralsjukhuset Karlstad</div>
    </div>
    <div class="week-tabs" id="week-tabs"><!-- dynamic --></div>
  </div>
</header>

<div class="hero-strip">
  <p>Solsidan öppet mån–fre 11:15–13:30 &nbsp;·&nbsp; Guldkornet lunch mån–fre 11:30–14:00, lör–sön 11:30–13:30</p>
</div>

<nav class="day-nav" aria-label="Välj dag">
  <div class="day-nav-inner" id="day-nav"><!-- dynamic --></div>
</nav>

<main>
  <div id="app">
    <div class="state-box" id="loading-state">
      <div class="spinner"></div>
      <span>Hämtar veckans matsedel…</span>
    </div>
    <div class="state-box" id="error-state" style="display:none">
      <div class="error-icon">🍽️</div>
      <div class="error-msg" id="error-msg">Kunde inte hämta matsedeln.</div>
      <button class="retry-btn" onclick="loadMenu()">Försök igen</button>
    </div>
    <div id="content-area" style="display:none">
      <div class="update-info" id="update-info"></div>
      <div id="day-content"><!-- dynamic --></div>
    </div>
  </div>
</main>

<footer>
  <p>
    Hämtas automatiskt från <a href="https://www.regionvarmland.se/regionvarmland/halsa--vard/mat-och-restaurang" target="_blank">Region Värmland</a>
    &nbsp;·&nbsp; Med reservation för ändringar
  </p>
</footer>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let menuData   = null;   // { solsidan, guldkornet, weekNums, updatedAt }
let activeWeek = null;
let activeDay  = null;

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
const SE_MONTHS = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];

const DAY_LABELS = {
  mon:'Måndag', tue:'Tisdag', wed:'Onsdag',
  thu:'Torsdag', fri:'Fredag', sat:'Lördag', sun:'Söndag'
};

function getISOWeek(d = new Date()) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getTodayKey() {
  return ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
}

function getTodayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekDays(weekNum) {
  const year = new Date().getFullYear();
  const jan4  = new Date(year, 0, 4);
  const dow   = jan4.getDay() || 7;                          // Mon=1 … Sun=7
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - dow + 1 + (weekNum - 1) * 7);

  return ['mon','tue','wed','thu','fri','sat','sun'].map((key, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return {
      key,
      label: DAY_LABELS[key],
      displayDate: `${d.getDate()} ${SE_MONTHS[d.getMonth()]}`,
      isoDate: iso,
    };
  });
}

// ── DISH ICON ─────────────────────────────────────────────────────────────────
function dishIcon(text) {
  const t = text.toLowerCase();
  if (/lax|sej|fisk|räk|torsk|strömming|spätta|röding|abborre|havs|skaldjur|hummer/.test(t))
    return '<div class="dish-icon fish">🐟</div>';
  if (/kyckling/.test(t))
    return '<div class="dish-icon meat">🍗</div>';
  if (/ägg|pannbiff|raggmunk|pytt/.test(t))
    return '<div class="dish-icon meat">🍳</div>';
  if (/fläsk|köttfärs|kotlettrad|entrecote|biff|rostbiff|kalops|lamm|oxkind|kalv|nöt|korv|isterband|sidfläsk/.test(t))
    return '<div class="dish-icon meat">🥩</div>';
  return '<div class="dish-icon veg">🌿</div>';
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderWeekTabs() {
  const tabs = document.getElementById('week-tabs');
  tabs.innerHTML = menuData.weekNums.map(wn => `
    <button class="week-tab ${wn === activeWeek ? 'active' : ''}"
            onclick="switchWeek(${wn})">
      Vecka ${wn}
    </button>
  `).join('');
}

function renderDayNav() {
  const nav    = document.getElementById('day-nav');
  const days   = getWeekDays(activeWeek);
  const today  = getTodayISO();

  nav.innerHTML = days.map(d => {
    const isToday = d.isoDate === today;
    return `
      <button class="day-btn ${d.key === activeDay ? 'active' : ''} ${isToday ? 'today' : ''}"
              data-day="${d.key}" onclick="switchDay('${d.key}')">
        ${d.label}${isToday ? '<span class="today-dot"></span>' : ''}
      </button>
    `;
  }).join('');
}

function renderDay() {
  const days    = getWeekDays(activeWeek);
  const dayMeta = days.find(d => d.key === activeDay) || days[0];
  const today   = getTodayISO();
  const isToday = dayMeta.isoDate === today;

  const sol = (menuData.solsidan[activeWeek]   || {})[activeDay] || [];
  const gul = (menuData.guldkornet[activeWeek] || {})[activeDay] || [];

  document.getElementById('day-content').innerHTML = `
    <div class="day-heading">
      <h2>${dayMeta.label}</h2>
      <span class="day-date">${dayMeta.displayDate}</span>
      ${isToday ? '<span class="today-badge">Idag</span>' : ''}
    </div>
    <div class="restaurant-grid">
      ${buildCard('Solsidan', 'Röda gatan D', 'mån–fre 11:15–13:30', sol,
          'https://www.regionvarmland.se/regionvarmland/halsa--vard/mat-och-restaurang', false)}
      ${buildCard('Guldkornet', 'Patienthotellet', 'mån–fre 11:30–14:00', gul,
          'https://www.regionvarmland.se/regionvarmland/halsa--vard/patienthotell/guldkornet-kok-och-kafe', true)}
    </div>
  `;
}

function buildCard(name, location, hours, dishes, source, showHours) {
  const isClosed = dishes.length === 0 || dishes[0] === 'STÄNGT';
  const isWeekend = ['sat','sun'].includes(activeDay);
  const closedForSolsidan = name === 'Solsidan' && isWeekend;
  const effectivelyClosed = isClosed || closedForSolsidan;

  const dishesHtml = effectivelyClosed
    ? `<p class="closed-msg">Stängt denna dag.</p>`
    : dishes.map(d => `
        <div class="dish">
          ${dishIcon(d)}
          <div class="dish-text">${escHtml(d)}</div>
        </div>
      `).join('');

  const hoursHtml = showHours && !effectivelyClosed ? `
    <div class="hours-row">
      <span><strong>Frukost</strong> ${['sat','sun'].includes(activeDay) ? '08:00–09:30' : '07:00–09:00'}</span>
      <span><strong>Middag</strong> 17:30–18:30</span>
    </div>` : '';

  return `
    <div class="restaurant-card">
      <div class="card-header">
        <div>
          <div class="restaurant-name">${name}</div>
          <div class="restaurant-meta">${location} · ${hours}</div>
        </div>
        <span class="badge ${effectivelyClosed ? 'badge-closed' : 'badge-open'}">
          ${effectivelyClosed ? 'Stängt' : 'Öppet'}
        </span>
      </div>
      <div class="menu-body">${dishesHtml}</div>
      ${hoursHtml}
      <div class="source-bar">
        <span>Region Värmland</span>
        <a href="${source}" target="_blank" rel="noopener">Källa ↗</a>
      </div>
    </div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────────
function switchWeek(weekNum) {
  activeWeek = weekNum;
  // Keep activeDay if it exists in new week, otherwise pick a sensible default
  renderWeekTabs();
  renderDayNav();
  renderDay();
}

function switchDay(dayKey) {
  activeDay = dayKey;
  renderDayNav();
  renderDay();
}

// ── INITIAL DEFAULTS ──────────────────────────────────────────────────────────
function pickDefaults() {
  const currentWeek = getISOWeek();
  const todayKey    = getTodayKey();

  // Pick the week closest to today
  const available = menuData.weekNums;
  if (available.includes(currentWeek)) {
    activeWeek = currentWeek;
  } else {
    // Pick the closest future week, or the last available
    const future = available.filter(w => w >= currentWeek);
    activeWeek = future.length ? future[0] : available[available.length - 1];
  }

  // Pick today if it's available, otherwise Monday
  activeDay = todayKey || 'mon';
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadMenu() {
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('error-state').style.display   = 'none';
  document.getElementById('content-area').style.display  = 'none';

  try {
    const res  = await fetch('/api/menu');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    menuData = await res.json();
    if (menuData.error) throw new Error(menuData.error);

    pickDefaults();

    // Update-time badge
    if (menuData.updatedAt) {
      const d = new Date(menuData.updatedAt);
      document.getElementById('update-info').textContent =
        `Uppdaterad ${d.toLocaleDateString('sv-SE')} kl. ${d.toLocaleTimeString('sv-SE', {hour:'2-digit',minute:'2-digit'})}`;
    }

    renderWeekTabs();
    renderDayNav();
    renderDay();

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('content-area').style.display  = 'block';
  } catch (err) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display   = 'flex';
    document.getElementById('error-msg').textContent       = err.message || 'Kunde inte hämta matsedeln.';
    console.error(err);
  }
}

// Start
loadMenu();
</script>
</body>
</html>
